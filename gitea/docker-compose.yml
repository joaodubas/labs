---
services:
  rustfs_perms:
    image: alpine
    user: root
    volumes:
      - rustfs_data:/data
    command: chown -R 10001:10001 /data

  rustfs:
    image: "rustfs/rustfs:1.0.0-alpha.93"
    hostname: rustfs
    restart: unless-stopped
    depends_on:
      rustfs_perms:
        condition: service_completed_successfully
    environment:
      RUSTFS_ACCESS_KEY: &rustfs_access_key ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: &rustfs_secret_access_key ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_REGION: &rustfs_region us-east-1
      RUSTFS_VOLUMES: /data
    volumes:
      - "rustfs_data:/data"
    networks:
      - git_cicd_net
    healthcheck:
      test: ["CMD", "curl", "-f", "--silent", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  rustfs_init:
    image: "minio/mc:RELEASE.2025-08-13T08-35-41Z"
    hostname: rustfs_init
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      RUSTFS_ACCESS_KEY: *rustfs_access_key
      RUSTFS_SECRET_KEY: *rustfs_secret_access_key
      RUSTFS_BUCKET: &rustfs_bucket ${RUSTFS_BUCKET:-gitea}
    networks:
      - git_cicd_net
    entrypoint: >
      /bin/sh -c "
        mc alias set rustfs http://rustfs:9000 $${RUSTFS_ACCESS_KEY} $${RUSTFS_SECRET_KEY} &&
        mc mb --ignore-existing rustfs/$${RUSTFS_BUCKET} &&
        echo 'Bucket $${RUSTFS_BUCKET} ready'
      "

  git:
    image: "gitea/gitea:1.25.5"
    init: true
    hostname: git
    environment:
      USER_UID: ${UID:-1000}
      USER_GID: ${GID:-1000}
      GITEA__database__DB_TYPE: ${GIT_DB_TYPE:-sqlite3}
      GITEA__server__DOMAIN: ${GIT_DOMAIN:-127.0.0.1}
      GITEA__server__HTTP_PORT: ${GIT_HTTP_PORT:-3000}
      GITEA__server__ROOT_URL: http://${GIT_DOMAIN:-127.0.0.1}:3000
      GITEA__server__SSH_DOMAIN: ${GIT_SSH_DOMAIN:-127.0.0.1}
      GITEA__server__SSH_PORT: ${GIT_SSH_PORT:-222}
      GITEA__server__SSH_LISTEN_PORT: ${GIT_SSH_LISTEN_PORT:-22}
      GITEA__service__DISABLE_REGISTRATION: ${GIT_DISABLE_REGISTRATION:-true}
      GITEA__storage__MINIO_ACCESS_KEY_ID: *rustfs_access_key
      GITEA__storage__MINIO_SECRET_ACCESS_KEY_ID: *rustfs_secret_access_key
      GITEA__storage__MINIO_BUCKET: *rustfs_bucket
      GITEA__storage__MINIO_ENDPOINT: "rustfs:9000"
      # NOTE: generate with `docker compose run --rm -u git git gitea generate secret LFS_JWT_SECRET`
      GITEA__server__LFS_JWT_SECRET: ${GIT_SERVER_LFS_JWT_SECRET:-}
      # NOTE: generate with `docker compose run --rm -u git git gitea generate secret SECRET_KEY`
      GITEA__security__SECRET_KEY: ${GIT_SECURITY_SECRET_KEY:-}
      # NOTE: generate with `docker compose run --rm -u git git gitea generate secret INTERNAL_TOKEN`
      GITEA__security__INTERNAL_TOKEN: ${GIT_SECURITY_INTERNAL_TOKEN:-}
      # NOTE: generate with `docker compose run --rm -u git git gitea generate secret JWT_SECRET`
      GITEA__oauth2__JWT_SECRET: ${GIT_OAUTH2_JWT_SECRET:-}
    restart: unless-stopped
    volumes:
      - "git_data:/data"
      - "./config/git:/data/gitea/conf"
    networks:
      - git_cicd_net
    ports:
      - "222:22"
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  git_runner:
    image: "gitea/act_runner:0.3.1"
    init: false
    hostname: git_runner
    environment:
      CONFIG_FILE: /opt/runner/config/config.yml
      GITEA_INSTANCE_URL: "http://git:3000"
      GITEA_RUNNER_REGISTRATION_TOKEN: "${GIT_RUNNER_REGISTRATION_TOKEN:-gitea-runner-token}"
      GITEA_RUNNER_NAME: "${GIT_RUNNER_NAME:-local-runner}"
      GITEA_RUNNER_LABELS: "${GIT_RUNNER_LABELS:-ubuntu-latest,ubuntu-24.04,ubuntu-22.04,elixir-1.19.5-otp-28}"
    depends_on:
      git:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - "runner_data:/data"
      - "./config/git_runner:/opt/runner/config"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - git_cicd_net

  cron:
    image: "premoweb/chadburn:1.0.7"
    init: true
    hostname: cron
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./config/cron:/opt/chadburn"
    restart: unless-stopped
    networks:
      - git_cicd_net
    command: daemon --config=/opt/chadburn/config.ini

  # TODO (jpd): to start renovate we must change ownership of renovate_data to
  # ubuntu user
  renovate:
    image: "renovate/renovate:43.102.11-full"
    init: true
    hostname: renovate
    environment:
      GITHUB_COM_TOKEN: ${GITHUB_COM_TOKEN:-token}
      RENOVATE_TOKEN: ${RENOVATE_TOKEN:-token}
      RENOVATE_GIT_AUTHOR: ${RENOVATE_GIT_AUTHOR:-'renovate <renovate@example.com>'}
      RENOVATE_CONFIG_FILE: "/opt/renovate/config.js"
      RENOVATE_BASE_DIR: "/opt/renovate_data"
    labels:
      chadburn.enabled: "true"
      chadburn.job-exec.renovate.schedule: "@every 30m"
      chadburn.job-exec.renovate.command: "/usr/local/sbin/renovate"
    volumes:
      - "./config/renovate:/opt/renovate"
      - "renovate_data:/opt/renovate_data"
    restart: unless-stopped
    networks:
      - git_cicd_net
    entrypoint: sleep
    command: infinity

volumes:
  git_data: {}
  runner_data: {}
  renovate_data: {}
  rustfs_data: {}

networks:
  git_cicd_net:
    name: git_cicd_net
